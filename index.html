<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="main-container">
      <h1>CSS: Flexbox</h1>
      <div id="container" class="container">
        <div class="red">R</div>
        <div class="orange">O</div>
        <div class="yellow">Y</div>
        <div class="green">G</div>
        <div class="blue">B</div>
        <div class="indigo">I</div>
        <div class="purple">P</div>
      </div>
      <div class="btn-tricks">
        <a href="./flexbox-tricks.html" target="_blank">Tricks</a>
      </div>
      <div class="flex-setting">
        <div>
          <label for="justify-content">justify-content:</label>
          <select id="justify-content">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
          </select>
        </div>
        <div>
          <label for="flex-wrap">flex-wrap:</label>
          <select id="flex-wrap">
            <option value="nowrap">nowrap</option>
            <option value="wrap">wrap</option>
            <option value="wrap-reverse">wrap-reverse</option>
          </select>
        </div>
        <div>
          <label for="align-items">align-items:</label>
          <select id="align-items">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="baseline">baseline</option>
            <option value="stretch">stretch</option>
          </select>
        </div>
        <div>
          <label for="align-content">align-content:</label>
          <select id="align-content">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
            <option value="stretch">stretch</option>
          </select>
        </div>
      </div>
    </div>
    <hr />
    <footer>
      <h1 class="footer-logo">
        🕷️s<img
          src="./code.png"
          class="code-image"
          height="15"
          alt="code image"
        />n
      </h1>
      <p id="footer" title="by: dtorrefiel">®️2026 Software Engineering.</p>
    </footer>
  </body>
</html>
